name: audit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

env:
  TAP: ${{ github.repository_owner }}/tap

jobs:
  audit:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Stage tap
        run: |
          dest="$(brew --repository)/Library/Taps/${{ github.repository_owner }}/homebrew-tap"
          mkdir -p "$(dirname "$dest")"
          cp -R "$GITHUB_WORKSPACE" "$dest"

      - run: brew audit --strict --online --tap="$TAP" ansible-security-scanner

      - run: brew install --build-from-source --verbose ansible-security-scanner

      - run: brew test --verbose ansible-security-scanner
